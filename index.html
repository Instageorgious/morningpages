<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Pages — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,700;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2c2416;
    --ink-light: #6b5c42;
    --ink-faint: #b8a98a;
    --parchment: #faf7f0;
    --parchment-warm: #f5f0e4;
    --parchment-mid: #ede5d0;
    --parchment-deep: #d4c9a8;
    --dawn: #e8b86d;
    --rose: #c97b84;
    --sage: #7a9e7e;
    --accent: #b5602a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(232,184,109,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(201,123,132,0.1) 0%, transparent 55%),
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.07) 27px, rgba(180,160,120,0.07) 28px);
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    margin: 24px;
    background: #fffef9;
    border: 1px solid var(--parchment-mid);
    border-radius: 4px;
    padding: 44px 40px 36px;
    box-shadow: 4px 4px 0 var(--parchment-deep);
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-style: italic;
    color: var(--ink);
    text-align: center;
    margin-bottom: 6px;
    line-height: 1.1;
  }

  .card-sub {
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: var(--ink-faint);
    text-align: center;
    margin-bottom: 30px;
    letter-spacing: 0.05em;
  }

  /* TAB TOGGLE */
  .tab-row {
    display: flex;
    border-bottom: 1px solid var(--parchment-deep);
    margin-bottom: 24px;
  }
  .tab {
    flex: 1; text-align: center;
    font-family: 'Caveat', cursive; font-size: 16px;
    color: var(--ink-faint); padding: 8px 0;
    cursor: pointer; transition: color 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* FORMS */
  .form-section { display: none; }
  .form-section.active { display: block; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-family: 'Caveat', cursive;
    font-size: 13px; color: var(--ink-light);
    margin-bottom: 5px; letter-spacing: 0.05em;
  }
  .field input {
    width: 100%;
    background: var(--parchment-warm);
    border: 1px solid var(--parchment-deep);
    border-radius: 3px;
    padding: 10px 13px;
    font-family: 'Lora', serif; font-size: 15px;
    color: var(--ink); outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--dawn); background: #fffef9; }
  .field input::placeholder { color: var(--ink-faint); }

  .submit-btn {
    width: 100%;
    background: var(--accent); color: white;
    border: none; border-radius: 3px;
    padding: 12px;
    font-family: 'Caveat', cursive; font-size: 17px;
    cursor: pointer; transition: opacity 0.2s;
    margin-top: 4px;
  }
  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:disabled { opacity: 0.5; cursor: default; }

  .forgot-link {
    display: block; text-align: right;
    font-family: 'Caveat', cursive; font-size: 13px;
    color: var(--ink-faint); margin-top: -10px; margin-bottom: 18px;
    cursor: pointer; text-decoration: none; transition: color 0.2s;
  }
  .forgot-link:hover { color: var(--ink-light); }

  /* STATUS */
  .status {
    font-family: 'Caveat', cursive; font-size: 14px;
    text-align: center; margin-top: 14px; min-height: 20px;
    transition: color 0.2s;
  }
  .status.error { color: var(--rose); }
  .status.success { color: var(--sage); }
  .status.info { color: var(--ink-faint); }

  /* DIVIDER */
  .divider {
    border: none; border-top: 1px solid var(--parchment-mid);
    margin: 28px 0 20px;
  }

  /* RESET FORM (shown when arriving via magic link) */
  #resetSection {
    display: none;
  }

  .back-link {
    display: block; text-align: center; margin-top: 18px;
    font-family: 'Caveat', cursive; font-size: 14px;
    color: var(--ink-faint); cursor: pointer;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--ink-light); }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Paper lines decoration */
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 48px;
    width: 1px; height: 100%;
    background: rgba(245,197,197,0.4);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="card">
  <!-- Normal auth UI -->
  <div id="authUI">
    <div class="card-title">morning pages</div>
    <div class="card-sub">a practice in showing up</div>

    <div class="tab-row">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">sign in</div>
      <div class="tab" id="tabSignup" onclick="switchTab('signup')">sign up</div>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="loginSection">
      <div class="field">
        <label>email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <a class="forgot-link" onclick="showForgot()">Forgot password?</a>
      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">sign in</button>
      <div class="status" id="loginStatus"></div>
    </div>

    <!-- SIGN UP -->
    <div class="form-section" id="signupSection">
      <div class="field">
        <label>email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="signupPassword" placeholder="at least 6 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label>confirm password</label>
        <input type="password" id="signupConfirm" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="submit-btn" id="signupBtn" onclick="handleSignup()">create account</button>
      <div class="status" id="signupStatus"></div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div class="form-section" id="forgotSection">
      <div class="field">
        <label>email address</label>
        <input type="email" id="forgotEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="submit-btn" id="forgotBtn" onclick="handleForgot()">send reset link</button>
      <div class="status" id="forgotStatus"></div>
      <a class="back-link" onclick="showForgotBack()">← back to sign in</a>
    </div>
  </div>

  <!-- RESET PASSWORD (shown when arriving via recovery link) -->
  <div id="resetUI" style="display:none">
    <div class="card-title">morning pages</div>
    <div class="card-sub">set a new password</div>
    <div class="field" style="margin-top:24px">
      <label>new password</label>
      <input type="password" id="resetPassword" placeholder="at least 6 characters" autocomplete="new-password">
    </div>
    <div class="field">
      <label>confirm new password</label>
      <input type="password" id="resetConfirm" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="submit-btn" id="resetBtn" onclick="handleReset()">update password</button>
    <div class="status" id="resetStatus"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hgahutrgojkftkufeirn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_J8a3aaiZm9PBFYQ0FLSx-g_71DYwaQL';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const JOURNAL_URL = 'morning-pages.html';

// ── CHECK FOR RECOVERY LINK ───────────────────────────────────────────────────
// Supabase puts the token in the URL hash on password recovery
async function checkForRecovery() {
  const hash = window.location.hash;
  if (hash && hash.includes('type=recovery')) {
    // Supabase will have already exchanged the token via onAuthStateChange
    document.getElementById('authUI').style.display = 'none';
    document.getElementById('resetUI').style.display = 'block';
    return true;
  }
  return false;
}

// ── AUTH STATE: if already logged in, go to journal ──────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('authUI').style.display = 'none';
    document.getElementById('resetUI').style.display = 'block';
    return;
  }
  if (event === 'SIGNED_IN' && session) {
    // Only redirect if we're not in recovery mode
    const hash = window.location.hash;
    if (!hash.includes('type=recovery')) {
      window.location.href = JOURNAL_URL;
    }
  }
});

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('loginSection').classList.toggle('active', tab === 'login');
  document.getElementById('signupSection').classList.toggle('active', tab === 'signup');
  document.getElementById('forgotSection').classList.remove('active');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  clearStatuses();
}

function showForgot() {
  document.getElementById('loginSection').classList.remove('active');
  document.getElementById('forgotSection').classList.add('active');
  document.getElementById('tabLogin').classList.remove('active');
  document.getElementById('tabSignup').classList.remove('active');
  clearStatuses();
}

function showForgotBack() {
  switchTab('login');
}

function clearStatuses() {
  ['loginStatus','signupStatus','forgotStatus','resetStatus'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = ''; el.className = 'status'; }
  });
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + type;
}

function setLoading(btnId, loading, label) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span>${label}` : label;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPassword').value;
  if (!email || !pw) { setStatus('loginStatus', 'Please fill in both fields.', 'error'); return; }

  setLoading('loginBtn', true, 'signing in…');
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  setLoading('loginBtn', false, 'sign in');

  if (error) {
    setStatus('loginStatus', error.message === 'Invalid login credentials'
      ? 'Incorrect email or password.' : error.message, 'error');
  }
  // Success is handled by onAuthStateChange → redirect
}

// ── SIGN UP ───────────────────────────────────────────────────────────────────
async function handleSignup() {
  const email   = document.getElementById('signupEmail').value.trim();
  const pw      = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;

  if (!email || !pw)       { setStatus('signupStatus', 'Please fill in all fields.', 'error'); return; }
  if (pw.length < 6)       { setStatus('signupStatus', 'Password must be at least 6 characters.', 'error'); return; }
  if (pw !== confirm)      { setStatus('signupStatus', 'Passwords do not match.', 'error'); return; }

  setLoading('signupBtn', true, 'creating account…');
  const { error } = await sb.auth.signUp({ email, password: pw });
  setLoading('signupBtn', false, 'create account');

  if (error) {
    setStatus('signupStatus', error.message, 'error');
  } else {
    setStatus('signupStatus', 'Account created! Check your email to confirm, then sign in.', 'success');
  }
}

// ── FORGOT PASSWORD ───────────────────────────────────────────────────────────
async function handleForgot() {
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { setStatus('forgotStatus', 'Please enter your email.', 'error'); return; }

  setLoading('forgotBtn', true, 'sending…');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/' + window.location.pathname.split('/').slice(0,-1).join('/') + '/index.html'
  });
  setLoading('forgotBtn', false, 'send reset link');

  if (error) {
    setStatus('forgotStatus', error.message, 'error');
  } else {
    setStatus('forgotStatus', 'Reset link sent — check your inbox.', 'success');
  }
}

// ── RESET PASSWORD ────────────────────────────────────────────────────────────
async function handleReset() {
  const pw      = document.getElementById('resetPassword').value;
  const confirm = document.getElementById('resetConfirm').value;

  if (!pw)           { setStatus('resetStatus', 'Please enter a new password.', 'error'); return; }
  if (pw.length < 6) { setStatus('resetStatus', 'Password must be at least 6 characters.', 'error'); return; }
  if (pw !== confirm) { setStatus('resetStatus', 'Passwords do not match.', 'error'); return; }

  setLoading('resetBtn', true, 'updating…');
  const { error } = await sb.auth.updateUser({ password: pw });
  setLoading('resetBtn', false, 'update password');

  if (error) {
    setStatus('resetStatus', error.message, 'error');
  } else {
    setStatus('resetStatus', 'Password updated! Taking you to the journal…', 'success');
    setTimeout(() => window.location.href = JOURNAL_URL, 1800);
  }
}

// ── ENTER KEY SUPPORT ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginActive  = document.getElementById('loginSection').classList.contains('active');
  const signupActive = document.getElementById('signupSection').classList.contains('active');
  const forgotActive = document.getElementById('forgotSection').classList.contains('active');
  const resetVisible = document.getElementById('resetUI').style.display !== 'none';
  if (resetVisible)  handleReset();
  else if (loginActive)  handleLogin();
  else if (signupActive) handleSignup();
  else if (forgotActive) handleForgot();
});
</script>
</body>
</html>
